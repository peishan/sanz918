<!DOCTYPE html>
<html>
<head>
  <title>Secure Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
    }
    .login-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #dashboard {
      display: none; /* hidden until login succeeds */
      padding: 20px;
    }
    input[type="password"] {
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <!-- Login Form -->
  <div class="login-box" id="loginBox">
    <h2>Enter Password</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="checkPassword()">Login</button>
    <p id="message"></p>
  </div>

  <!-- Wrapped Dashboard Content -->
  <div id="dashboard">
    <h1>Welcome to the Dashboard</h1>
    <p>This is your private content.</p>
  </div>

  <script>
    // Allowed users and passwords
    const users = {
      "sanz": "test123",   // your password
      "admin": "secret"    // admin password
    };

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      let accessGranted = false;

      // Loop through users to check if password matches
      for (let user in users) {
        if (input === users[user]) {
          accessGranted = true;
          break;
        }
      }

      if (accessGranted) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
      } else {
        document.getElementById("message").innerText = "Access Denied";
      }
    }
  </script>
</body>
</html>
