<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sanz’s Private Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    h1 {
      margin-bottom: 30px;
      font-weight: 600;
    }
    .link-card {
      background: rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 15px 25px;
      margin: 12px;
      width: 250px;
      transition: 0.3s;
      backdrop-filter: blur(10px);
    }
    .link-card:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.05);
    }
    a {
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1em;
    }
    .login-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    input[type="password"] {
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 4px;
      width: 200px;
    }
    button {
      background: #ffffff;
      color: #2575fc;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #e6e6e6;
    }
  </style>
</head>
<body>
  <!-- Login Form -->
  <div class="login-box" id="loginBox">
    <h2>Enter Password</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="checkPassword()">Login</button>
    <p id="message"></p>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none;">
    <h1>🌌 Sanz’s Private Dashboard</h1>

    <div class="link-card"><a href="http://www.sanjoelimnida.xyz">🌐 My Website</a></div>
    <div class="link-card"><a href="https://bit.ly/parcels-tracker">📦 My Parcels</a></div>
    <div class="link-card"><a href="https://soels-care.pplx.app">🐾 Soel’s Care Dashboard</a></div>
    <div class="link-card"><a href="https://storyforge-writing.pplx.app">✍️ StoryForge</a></div>
    <div class="link-card"><a href="https://sans-budget-dashboard.netlify.app">💰 Monthly Budget</a></div>
    <div class="link-card"><a href="https://peishan.github.io/water-garden-grove/">🌱 Water Garden Grove</a></div>
    <div class="link-card"><a href="https://peishan.github.io/Sans-plant-nanny/">💧 Plant Nanny – Water Tracker</a></div>
  </div>

  <script>
    const users = {
      "sanz": "test123",
      "admin": "secret"
    };

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      let loggedInUser = null;

      for (let user in users) {
        if (input === users[user]) {
          loggedInUser = user;
          break;
        }
      }

      if (loggedInUser) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        const header = document.querySelector("h1");
        header.innerText = `🌌 Welcome, ${loggedInUser.charAt(0).toUpperCase() + loggedInUser.slice(1)}!`;
      } else {
        document.getElementById("message").innerText = "Access Denied";
      }
    }
  </script>
</body>
</html>
